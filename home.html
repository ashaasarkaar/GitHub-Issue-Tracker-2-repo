<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker | Home Page</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- font awesome cdn link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Added Daisy UI Link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- CSS Link -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- header Section START -->
    <header class="bg-base-100 shadow-md">
        <nav class="w-11/12 mx-auto">
            <div class="navbar">
                <div class="navbar-start">
                    <div class="dropdown">
                        <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h8m-8 6h16" />
                            </svg>
                        </div>
       
         <ul
        tabindex="-1"
        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow space-y-4">

             <label class="input w-48">
                       <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Search issues..."/>
                    </label>

                    <a class="btn"><i class="fa-solid fa-plus"></i>New Issues...</a>
       
      </ul>
      </div>
                        <!-- logo with Text START -->
                    <div class="flex items-center gap-3">
                        <img src="./assets/github-logo.png" alt="github logo" class="w-12 h-12">
                        <h2 class="font-bold text-xl">GitHub Issues Tracker</h2>
                    </div>
                    <!-- logo with Text END -->
                   
                
                     </div>
            
            <div class="navbar-end hidden lg:flex space-x-2">

                    <label class="input w-64">
                       <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Search issues..."/>
                    </label>

                    <a class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issues...</a>
                    
                </div>
            </div>
        </nav>
    </header>
    <!-- header Section END -->

    <!-- All Button Section START -->
     <section class="btns-section w-10/12 mx-auto mt-10 py-4 px-3 bg-base-100 shadow-lg rounded-md space-x-3">
        <a class="btn px-9">All</a>
        <a class="btn px-7">Open</a>
        <a class="btn px-7">Closed</a>
     </section>
    <!-- All Button Section END -->
</body>
</html>
